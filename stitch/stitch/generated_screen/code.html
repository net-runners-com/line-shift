<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Shift Submission</title>
<!-- Load Inter Font -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS v3 with Plugins -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#3994ef',
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          },
          borderRadius: {
            'custom': '8px',
          }
        }
      }
    }
  </script>
<style data-purpose="custom-layout">
    body {
      font-family: 'Inter', sans-serif;
      background-color: #f8fafc;
      /* Ensure space for bottom navigation */
      padding-bottom: 80px;
    }
    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
    }
    /* Simple selection visual for calendar */
    .day-selected {
      background-color: #3994ef !important;
      color: white !important;
    }
  </style>
</head>
<body class="text-slate-900">
<!-- BEGIN: Header -->
<header class="bg-white border-b border-slate-200 sticky top-0 z-10 px-4 py-3">
<div class="max-w-md mx-auto flex items-center justify-between">
<h1 class="text-lg font-bold text-slate-800">Submit Schedule</h1>
<span class="text-xs font-medium text-slate-500 bg-slate-100 px-2 py-1 rounded-custom">OCT 2023</span>
</div>
</header>
<!-- END: Header -->
<main class="max-w-md mx-auto p-4 space-y-6">
<!-- BEGIN: CalendarSection -->
<section class="bg-white rounded-custom shadow-sm border border-slate-200 overflow-hidden" data-purpose="calendar-container">
<div class="p-4 bg-slate-50 border-b border-slate-200 flex justify-between items-center">
<h2 class="font-semibold text-slate-700">October 2023</h2>
<div class="flex space-x-2">
<button class="p-1 text-slate-400 hover:text-primary"><svg class="h-5 w-5" fill="currentColor" viewbox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"><path clip-rule="evenodd" d="M12.707 5.293a1 1 0 010 1.414L9.414 10l3.293 3.293a1 1 0 01-1.414 1.414l-4-4a1 1 0 010-1.414l4-4a1 1 0 011.414 0z" fill-rule="evenodd"></path></svg></button>
<button class="p-1 text-slate-400 hover:text-primary"><svg class="h-5 w-5" fill="currentColor" viewbox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"><path clip-rule="evenodd" d="M7.293 14.707a1 1 0 010-1.414L10.586 10 7.293 6.707a1 1 0 011.414-1.414l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0z" fill-rule="evenodd"></path></svg></button>
</div>
</div>
<!-- Calendar Days Header -->
<div class="calendar-grid text-center text-[10px] font-bold text-slate-400 py-2 border-b border-slate-100">
<div>SUN</div><div>MON</div><div>TUE</div><div>WED</div><div>THU</div><div>FRI</div><div>SAT</div>
</div>
<!-- Calendar Grid for Oct 2023 (Starts on Sunday Oct 1st) -->
<div class="calendar-grid text-sm">
<!-- Week 1 -->
<button class="h-12 border-r border-b border-slate-100 day-selected">1</button>
<button class="h-12 border-r border-b border-slate-100">2</button>
<button class="h-12 border-r border-b border-slate-100">3</button>
<button class="h-12 border-r border-b border-slate-100">4</button>
<button class="h-12 border-r border-b border-slate-100">5</button>
<button class="h-12 border-r border-b border-slate-100">6</button>
<button class="h-12 border-b border-slate-100">7</button>
<!-- Week 2 -->
<button class="h-12 border-r border-b border-slate-100">8</button>
<button class="h-12 border-r border-b border-slate-100">9</button>
<button class="h-12 border-r border-b border-slate-100">10</button>
<button class="h-12 border-r border-b border-slate-100">11</button>
<button class="h-12 border-r border-b border-slate-100">12</button>
<button class="h-12 border-r border-b border-slate-100">13</button>
<button class="h-12 border-b border-slate-100">14</button>
<!-- Week 3 -->
<button class="h-12 border-r border-b border-slate-100">15</button>
<button class="h-12 border-r border-b border-slate-100">16</button>
<button class="h-12 border-r border-b border-slate-100 text-primary font-bold">17</button>
<button class="h-12 border-r border-b border-slate-100">18</button>
<button class="h-12 border-r border-b border-slate-100">19</button>
<button class="h-12 border-r border-b border-slate-100">20</button>
<button class="h-12 border-b border-slate-100">21</button>
<!-- Week 4 -->
<button class="h-12 border-r border-b border-slate-100">22</button>
<button class="h-12 border-r border-b border-slate-100">23</button>
<button class="h-12 border-r border-b border-slate-100">24</button>
<button class="h-12 border-r border-b border-slate-100">25</button>
<button class="h-12 border-r border-b border-slate-100">26</button>
<button class="h-12 border-r border-b border-slate-100">27</button>
<button class="h-12 border-b border-slate-100">28</button>
<!-- Week 5 -->
<button class="h-12 border-r border-slate-100">29</button>
<button class="h-12 border-r border-slate-100">30</button>
<button class="h-12 border-r border-slate-100">31</button>
<div class="h-12 border-r border-slate-50 bg-slate-50"></div>
<div class="h-12 border-r border-slate-50 bg-slate-50"></div>
<div class="h-12 border-r border-slate-50 bg-slate-50"></div>
<div class="h-12 bg-slate-50"></div>
</div>
</section>
<!-- END: CalendarSection -->
<!-- BEGIN: ShiftSelection -->
<section class="space-y-3" data-purpose="shift-options">
<h3 class="text-sm font-semibold text-slate-500 uppercase tracking-wider">Select Shift for Oct 1st</h3>
<div class="grid grid-cols-2 gap-3">
<!-- Morning -->
<label class="relative flex flex-col p-4 bg-white border border-slate-200 rounded-custom cursor-pointer hover:border-primary transition-colors">
<input class="sr-only peer" name="shift" type="radio" value="morning"/>
<div class="peer-checked:text-primary">
<span class="block text-xs font-bold text-slate-400 uppercase">08:00 - 16:00</span>
<span class="block text-base font-semibold">Morning</span>
</div>
<div class="absolute top-2 right-2 hidden peer-checked:block text-primary">
<svg class="h-5 w-5" fill="currentColor" viewbox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"><path clip-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" fill-rule="evenodd"></path></svg>
</div>
</label>
<!-- Afternoon -->
<label class="relative flex flex-col p-4 bg-white border border-slate-200 rounded-custom cursor-pointer hover:border-primary transition-colors">
<input class="sr-only peer" name="shift" type="radio" value="afternoon"/>
<div class="peer-checked:text-primary">
<span class="block text-xs font-bold text-slate-400 uppercase">16:00 - 00:00</span>
<span class="block text-base font-semibold">Afternoon</span>
</div>
<div class="absolute top-2 right-2 hidden peer-checked:block text-primary">
<svg class="h-5 w-5" fill="currentColor" viewbox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"><path clip-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" fill-rule="evenodd"></path></svg>
</div>
</label>
<!-- Night -->
<label class="relative flex flex-col p-4 bg-white border border-slate-200 rounded-custom cursor-pointer hover:border-primary transition-colors">
<input class="sr-only peer" name="shift" type="radio" value="night"/>
<div class="peer-checked:text-primary">
<span class="block text-xs font-bold text-slate-400 uppercase">00:00 - 08:00</span>
<span class="block text-base font-semibold">Night</span>
</div>
<div class="absolute top-2 right-2 hidden peer-checked:block text-primary">
<svg class="h-5 w-5" fill="currentColor" viewbox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"><path clip-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" fill-rule="evenodd"></path></svg>
</div>
</label>
<!-- Off -->
<label class="relative flex flex-col p-4 bg-white border border-slate-200 rounded-custom cursor-pointer hover:border-primary transition-colors">
<input checked="" class="sr-only peer" name="shift" type="radio" value="off"/>
<div class="peer-checked:text-primary">
<span class="block text-xs font-bold text-slate-400 uppercase">ALL DAY</span>
<span class="block text-base font-semibold">Off</span>
</div>
<div class="absolute top-2 right-2 hidden peer-checked:block text-primary">
<svg class="h-5 w-5" fill="currentColor" viewbox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"><path clip-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" fill-rule="evenodd"></path></svg>
</div>
</label>
</div>
</section>
<!-- END: ShiftSelection -->
<!-- BEGIN: SubmissionAction -->
<div class="pt-4">
<button class="w-full bg-primary text-white font-bold py-4 rounded-custom shadow-lg active:scale-[0.98] transition-transform">
        Submit October Schedule
      </button>
<p class="text-center text-xs text-slate-400 mt-4">You can edit your submission until Sept 25th.</p>
</div>
<!-- END: SubmissionAction -->
</main>
<!-- BEGIN: BottomNavigation -->
<nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 h-16 flex items-center justify-around px-4 z-20">
<!-- Schedule Item -->
<a class="flex flex-col items-center justify-center text-slate-400 hover:text-primary" href="#">
<svg class="h-6 w-6" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
<span class="text-[10px] font-bold mt-1 uppercase">Schedule</span>
</a>
<!-- Members Item -->
<a class="flex flex-col items-center justify-center text-slate-400 hover:text-primary" href="#">
<svg class="h-6 w-6" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
<span class="text-[10px] font-bold mt-1 uppercase">Members</span>
</a>
<!-- Shifts Item (Active) -->
<a class="flex flex-col items-center justify-center text-primary" href="#">
<svg class="h-6 w-6" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
<span class="text-[10px] font-bold mt-1 uppercase">Shifts</span>
</a>
</nav>
<!-- END: BottomNavigation -->
</body></html>
